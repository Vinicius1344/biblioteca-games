<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Biblioteca de Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .card { background-color: #1e1e1e; border: none; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,127,0.2); }
    </style>
</head>
<body class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-success">🎮 Game Library</h1>
        <a href="/add" class="btn btn-success">+ Adicionar Jogo</a>
    </div>

    <div class="row">
        {% for jogo in jogos %}
        <div class="col-md-4 mb-4">
            <div class="card p-3">
                <h3 style="color: #ffffff; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 127, 0.7);">{{ jogo.nome }}</h3>
                <p class="text-muted mb-1">Gênero: {{ jogo.genero }}</p>
                <p class="badge bg-primary">{{ jogo.plataforma }}</p>
                <div class="mt-3">
                    <a href="/edit/{{ jogo.id }}" class="btn btn-sm btn-outline-warning">Editar</a>
                    <a href="/delete/{{ jogo.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Excluir este jogo?')">Excluir</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
