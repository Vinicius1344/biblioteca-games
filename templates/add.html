<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #121212; color: white; }</style>
</head>
<body class="container py-5">
    <div class="col-md-6 offset-md-3">
        <h2 class="mb-4">Adicionar Novo Jogo</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome do Jogo</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Gênero</label>
                <input type="text" name="genero" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Plataforma</label>
                <input type="text" name="plataforma" class="form-control" placeholder="ex: PC, PS5, Xbox" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Salvar Jogo</button>
            <a href="/" class="btn btn-link text-white w-100 mt-2">Voltar</a>
        </form>
    </div>
</body>
</html>
